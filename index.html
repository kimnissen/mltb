function gaussLL(x,m,s){if(s<=0)return 0;const z=(x-m)/s;return -0.5*z*z-Math.log(s)}
function eCat(e){if(!e)return"neutral";if(e.startsWith("A")||e==="B")return"modern";if(e==="C"||e==="D")return"neutral";return"old"}

function predictV2(prop) {
  const res = SEGMENTS.map(seg => {
    const p=seg.profile; let ls=Math.log(seg.basePrior+0.001);
    ls+=gaussLL(prop.area,p.area.mean,p.area.sd)*1.5;
    ls+=gaussLL(prop.rooms,p.rooms.mean,p.rooms.sd)*1.8;
    ls+=gaussLL(prop.price,p.price.mean,p.price.sd)*1.3;
    ls+=gaussLL(prop.year,p.year.mean,p.year.sd)*0.6;
    ls+=gaussLL(prop.groundArea,p.groundArea.mean,p.groundArea.sd)*1.0;
    ls+=gaussLL(prop.floors,p.floors.mean,p.floors.sd)*0.4;
    ls+=Math.log((p.zoneAffinity[prop.zone]||0.05)+0.001)*2.0;
    ls+=Math.log((p.typeAffinity[prop.type]||0.05)+0.001)*1.6;
    ls+=Math.log((p.energyPref[eCat(prop.energy)]||0.3)+0.001)*0.5;
    const ppm2=prop.price/Math.max(prop.area,1);const ePpm2=p.price.mean/Math.max(p.area.mean,1);
    ls+=gaussLL(ppm2,ePpm2,ePpm2*0.4)*0.8;
    return {...seg, logScore:ls};
  });
  const mx=Math.max(...res.map(r=>r.logScore));
  const ex=res.map(r=>({...r,expScore:Math.exp(r.logScore-mx)}));
  const sm=ex.reduce((s,r)=>s+r.expScore,0);
  return ex.map(r=>({...r,probability:Math.round((r.expScore/sm)*100)})).sort((a,b)=>b.probability-a.probability);
}

function getSizeBracket(area){if(area<75)return"<75";if(area<=150)return"75-150";if(area<=250)return"150-250";return">250"}

function buildPackage(segLabel, area, productData) {
  const sb = getSizeBracket(area);
  const items = [];
  let filmWebAdded = false, filmSoMeAdded = false;

  productData.forEach(p => {
    const sizeCount = p.sizes[sb] || 0;
    if (sizeCount > 0) items.push({...p, qty:sizeCount, source:"size"});
  });

  productData.forEach(p => {
    const segCount = p.segments[segLabel] || 0;
    if (segCount <= 0) return;
    if (p.category === "Film Web") { if (filmWebAdded) return; filmWebAdded = true; }
    if (p.category === "Film SoMe") { if (filmSoMeAdded) return; filmSoMeAdded = true; }
    const existing = items.find(i => i.name === p.name);
    if (existing) { existing.qty = Math.max(existing.qty, segCount); existing.source = "both"; }
    else items.push({...p, qty:segCount, source:"segment"});
  });
  return items;
}

function PackageTable({pkg, extras, customPrices, globalPct, onRemoveExtra}) {
  const allItems = [...pkg];
  extras.forEach(ex => {
    allItems.push({...ex, source:"manual"});
  });

  if (allItems.length === 0) return <p style={{fontFamily:F,fontSize:13,color:"#999",padding:16}}>Ingen produkter i pakken.</p>;

  const catOrder=["Opstart","Still billede - Premium","Plantegning","Film Web","Film SoMe","Tekst"];
  const catIcons={"Opstart":"\u{1F680}","Still billede - Premium":"\u{1F4F8}","Plantegning":"\u{1F4D0}","Film Web":"\u{1F3AC}","Film SoMe":"\u{1F4F1}","Tekst":"\u{270D}\uFE0F}","Gebyr":"\u{1F4CB}"};
  const grouped={};
  allItems.forEach(item=>{const c=item.category||"Andet";if(!grouped[c])grouped[c]=[];grouped[c].push(item)});
  const sortedCats=Object.keys(grouped).sort((a,b)=>{const ai=catOrder.indexOf(a),bi=catOrder.indexOf(b);return(ai===-1?99:ai)-(bi===-1?99:bi)});

  let totalPrice=0;
  allItems.forEach(item=>{
    const cp=customPrices[item.name];
    let up=(cp!==undefined&&cp!=="")?Number(cp):item.price;
    if(globalPct&&globalPct!==0&&(cp===undefined||cp===""))up=Math.round(item.price*(1+globalPct/100));
    totalPrice+=up*item.qty;
  });

  function getPrice(item){
    const cp=customPrices[item.name];
    let up=(cp!==undefined&&cp!=="")?Number(cp):item.price;
    if(globalPct&&globalPct!==0&&(cp===undefined||cp===""))up=Math.round(item.price*(1+globalPct/100));
    return up;
  }

  return <div>
    {sortedCats.map(cat=><div key={cat} style={{marginBottom:14}}>
      <div style={{fontFamily:F,fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em",color:"#999",marginBottom:6}}>{catIcons[cat]||"\u{1F4E6}"} {cat}</div>
      {grouped[cat].map((item,i)=>{
        const up=getPrice(item);const isCustom=(customPrices[item.name]!==undefined&&customPrices[item.name]!=="")||(globalPct&&globalPct!==0);
        const isManual=item.source==="manual";
        return <div key={i} style={{display:"flex",alignItems:"center",padding:"7px 12px",background:i%2===0?"#faf8f6":"#fff",borderRadius:8,marginBottom:2,gap:8}}>
          <div style={{flex:1,minWidth:0}}>
            <span style={{fontFamily:F,fontSize:12.5,color:"#1a1a2e",fontWeight:500}}>{item.name}</span>
            {item.source==="segment"&&<span style={{fontSize:9.5,color:"#E8604C",marginLeft:5,fontWeight:700}}>SEGMENT</span>}
            {item.source==="size"&&<span style={{fontSize:9.5,color:"#3D5A99",marginLeft:5,fontWeight:700}}>STR</span>}
            {item.source==="both"&&<span style={{fontSize:9.5,color:"#4A7C59",marginLeft:5,fontWeight:700}}>AUTO</span>}
            {isManual&&<span style={{fontSize:9.5,color:"#8B6F47",marginLeft:5,fontWeight:700}}>TILVALG</span>}
          </div>
          <span style={{fontFamily:F,fontSize:11.5,color:"#999",width:30,textAlign:"center"}}>{"\u00D7"}{item.qty}</span>
          <span style={{fontFamily:F,fontSize:12.5,fontWeight:600,color:isCustom?"#2B3A67":"#1a1a2e",minWidth:65,textAlign:"right"}}>
            {(up*item.qty).toLocaleString("da-DK",{maximumFractionDigits:0})} kr.{!!isCustom&&<span style={{fontSize:8,color:"#E8604C",marginLeft:2}}>{"\u270E"}</span>}
          </span>
          {isManual&&<button onClick={()=>onRemoveExtra(item._eid)} style={{background:"none",border:"none",color:"#ccc",cursor:"pointer",fontSize:14,padding:"0 4px"}}>{"\u2715"}</button>}
        </div>;
      })}
    </div>)}
    <div style={{borderTop:"2px solid #E8604C",marginTop:14,paddingTop:14,display:"flex",justifyContent:"flex-end",alignItems:"center"}}>
      <div style={{textAlign:"right"}}>
        <div style={{fontFamily:F,fontSize:10,color:"#999",textTransform:"uppercase",letterSpacing:"0.08em"}}>Total</div>
        <div style={{fontFamily:F,fontSize:22,fontWeight:800,color:"#E8604C"}}>{totalPrice.toLocaleString("da-DK",{maximumFractionDigits:0})} kr.</div>
      </div>
    </div>
  </div>;
}

            <span style={{fontFamily:F,fontSize:12,color:"#999"}}>Slår igennem på alle standardpriser. Individuelle priser overskriver.</span>
          </div>
          {Object.keys(cats).map(cat=><div key={cat} style={{marginBottom:18}}>
            <div style={{fontFamily:F,fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em",color:"#aaa",marginBottom:6,borderBottom:"1px solid #f0eeec",paddingBottom:4}}>{cat}</div>
            {cats[cat].map((p,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
              <span style={{fontFamily:F,fontSize:12,color:"#4a4a5a",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</span>
              <span style={{fontFamily:F,fontSize:11,color:"#bbb",width:55,textAlign:"right",flexShrink:0}}>{p.price} kr.</span>
              <input type="number" value={customPrices[p.name]||""} onChange={e=>{const v={...customPrices};if(e.target.value==="")delete v[p.name];else v[p.name]=e.target.value;setCustomPrices(v)}}
                placeholder="Din pris" style={{width:85,padding:"4px 8px",borderRadius:6,border:"1px solid #eee",fontFamily:F,fontSize:11,textAlign:"right"}}/>
            </div>)}
          </div>)}
        </div>}
        {tab==="engine"&&<div>
          <p style={{fontFamily:F,fontSize:12,color:"#999",marginBottom:16}}>Antal af hvert produkt pr. segment. Tal = antal i pakken. Tomt = ikke inkluderet. Maks 1 Film Web og 1 Film SoMe pr. pakke.</p>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontFamily:F,fontSize:11}}>
              <thead><tr style={{background:"#faf8f6"}}>
                <th style={{textAlign:"left",padding:"8px 6px",fontWeight:700,color:"#1a1a2e",position:"sticky",left:0,background:"#faf8f6",minWidth:180}}>Produkt</th>
                {segLabels.map(s=><th key={s} style={{padding:"8px 4px",fontWeight:600,color:"#666",fontSize:9.5,textAlign:"center",minWidth:55,writingMode:"vertical-rl",transform:"rotate(180deg)",height:90}}>{s}</th>)}
              </tr></thead>
              <tbody>{productData.filter(p=>p.category!=="Gebyr").map((p,pi)=><tr key={pi} style={{borderBottom:"1px solid #f8f8f8"}}>
                <td style={{padding:"4px 6px",fontSize:11,color:"#1a1a2e",position:"sticky",left:0,background:"#fff"}}>{p.name}</td>
                {segLabels.map(s=>{
                  const val=p.segments[s]||"";
                  return <td key={s} style={{textAlign:"center",padding:2}}>
                    <input type="number" min="0" max="99" value={val} onChange={e=>{
                      const nv=e.target.value===""?0:parseInt(e.target.value);
                      p.segments[s]=nv>0?nv:undefined;
                      if(!nv||nv<=0)delete p.segments[s];
                    }} style={{width:32,padding:"3px",borderRadius:4,border:"1px solid #eee",textAlign:"center",fontSize:11,fontFamily:F,background:val?"#fef3f1":"#fff"}}/>
                  </td>;
                })}
              </tr>)}</tbody>
            </table>
          </div>
        </div>}
        {tab==="sizes"&&<div>
          <p style={{fontFamily:F,fontSize:12,color:"#999",marginBottom:16}}>Antal af hvert produkt pr. størrelsesbracket. Disse tilføjes altid uanset segment.</p>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontFamily:F,fontSize:11}}>
              <thead><tr style={{background:"#faf8f6"}}>
                <th style={{textAlign:"left",padding:"8px 6px",fontWeight:700,color:"#1a1a2e",minWidth:200}}>Produkt</th>
                {sizes.map(s=><th key={s} style={{padding:"8px 10px",fontWeight:600,color:"#666",textAlign:"center",minWidth:60}}>{s} m{"\u00B2"}</th>)}
              </tr></thead>
              <tbody>{productData.filter(p=>p.category!=="Gebyr").map((p,pi)=><tr key={pi} style={{borderBottom:"1px solid #f8f8f8"}}>
                <td style={{padding:"4px 6px",fontSize:11,color:"#1a1a2e"}}>{p.name}</td>
                {sizes.map(s=>{
                  const val=p.sizes[s]||"";
                  return <td key={s} style={{textAlign:"center",padding:2}}>
                    <input type="number" min="0" max="99" value={val} onChange={e=>{
                      const nv=e.target.value===""?0:parseInt(e.target.value);
                      p.sizes[s]=nv>0?nv:undefined;
                      if(!nv||nv<=0)delete p.sizes[s];
                    }} style={{width:40,padding:"3px",borderRadius:4,border:"1px solid #eee",textAlign:"center",fontSize:11,fontFamily:F,background:val?"#E8F4FD":"#fff"}}/>
                  </td>;
                })}
              </tr>)}</tbody>
            </table>
          </div>
        </div>}
      </div>
      <div style={{padding:"16px 28px",borderTop:"1px solid #f0eeec",flexShrink:0}}>
        <button onClick={onClose} style={{width:"100%",padding:"12px",borderRadius:10,border:"none",background:"#E8604C",color:"#fff",fontFamily:F,fontSize:14,fontWeight:700,cursor:"pointer"}}>Gem og luk</button>
      </div>
    </div>
  </div>;
}

    {d:"Strandvejen 88, 2900 Hellerup",k:"strandvejen 88, 2900 hellerup",s:"Villa \u00B7 220m\u00B2 \u00B7 6V"},
    {d:"Søndergade 22, 8700 Horsens",k:"søndergade 22, 2. sal, 8700 horsens",s:"Lejlighed \u00B7 85m\u00B2 \u00B7 3V"},
    {d:"Bakkevej 7, 5792 Årslev",k:"bakkevej 7, 5792 årslev",s:"Parcelhus \u00B7 165m\u00B2 \u00B7 5V"},

        onMouseEnter={e=>{e.currentTarget.style.borderColor="#E8604C";e.currentTarget.style.transform="translateY(-1px)"}}

  </div>;
}

// ============================================================
// MAIN APP
// ============================================================
function App() {
  const [address,setAddress]=useState("");
  const [result,setResult]=useState(null);
  const [loading,setLoading]=useState(false);
  const [selectedSeg,setSelectedSeg]=useState(null);
  const [extras,setExtras]=useState([]);
  const [showAdmin,setShowAdmin]=useState(false);
  const [adminAuth,setAdminAuth]=useState(false);
  const [adminUser,setAdminUser]=useState("");
  const [adminPass,setAdminPass]=useState("");
  const [adminLoginError,setAdminLoginError]=useState(false);
  const [customPrices,setCustomPrices]=useState({});
  const [globalPct,setGlobalPct]=useState(0);
  const [productData]=useState(()=>JSON.parse(JSON.stringify(PRODUCTS)));
  const [mæglerAuth,setMæglerAuth]=useState(false);
  const [mæglerUser,setMæglerUser]=useState("");
  const [mæglerPass,setMæglerPass]=useState("");
  const [mæglerErr,setMæglerErr]=useState(false);
  const [showMæglerPricing,setShowMæglerPricing]=useState(false);
  function handleMæglerLogin(){if(mæglerUser==="mægleradmin"&&mæglerPass==="mæglerpassword"){setMæglerAuth(true);setMæglerErr(false);setShowMæglerPricing(true)}else setMæglerErr(true)}

  function go(q) {
    const n=(q||address).toLowerCase().trim();
    setLoading(true);setResult(null);setSelectedSeg(null);setExtras([]);
    setTimeout(()=>{
      const key=Object.keys(MOCK_PROPERTIES).find(k=>n.includes(k)||k.includes(n));
      if(key){const p=MOCK_PROPERTIES[key];const buyers=predictV2(p);setResult({property:p,buyers});setSelectedSeg(buyers[0].label);setAddress(p.address)}
      else setResult({notFound:true});
      setLoading(false);
    },1000);
  }

  const pkg = useMemo(()=>{
    if(!result||!result.property||!selectedSeg)return[];
    return buildPackage(selectedSeg,result.property.area,productData);
  },[result,selectedSeg,productData]);

  function handleAdminLogin(){
    if(adminUser==="admin"&&adminPass==="adminpassword"){setAdminAuth(true);setAdminLoginError(false);setShowAdmin(true)}
    else setAdminLoginError(true);
  }

  return <div style={{minHeight:"100vh",background:"#faf8f6",color:"#1a1a2e"}}>
    <AdminPanel show={showAdmin&&adminAuth} onClose={()=>setShowAdmin(false)} customPrices={customPrices} setCustomPrices={setCustomPrices} globalPct={globalPct} setGlobalPct={setGlobalPct} productData={productData}/>

    {/* MÆGLER PRICING MODAL */}
    {showMæglerPricing&&<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.5)",zIndex:150,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setShowMæglerPricing(false)}>
      <div style={{background:"#fff",borderRadius:16,width:"95%",maxWidth:650,maxHeight:"85vh",overflowY:"auto",padding:"28px",boxShadow:"0 20px 60px rgba(0,0,0,0.2)"}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <h2 style={{fontFamily:F,fontSize:18,fontWeight:700,color:"#1a1a2e",margin:0}}>Mine priser</h2>
          <button onClick={()=>setShowMæglerPricing(false)} style={{background:"none",border:"none",fontSize:22,color:"#999",cursor:"pointer"}}>{"\u2715"}</button>
        </div>
        <div style={{padding:"14px 18px",background:"#fef3f1",borderRadius:12,marginBottom:20,display:"flex",alignItems:"center",gap:16}}>
          <div>
            <label style={{fontFamily:F,fontSize:11,fontWeight:700,color:"#E8604C",display:"block",marginBottom:4}}>Global prisjustering (%)</label>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <input type="number" value={globalPct||""} onChange={e=>setGlobalPct(e.target.value===""?0:Number(e.target.value))}
                placeholder="0" style={{width:80,padding:"8px 12px",borderRadius:8,border:"1px solid #ddd",fontFamily:F,fontSize:14,textAlign:"center"}}/>
              <span style={{fontFamily:F,fontSize:12,color:"#999"}}>% på alle standardpriser</span>
            </div>
          </div>
        </div>
        <p style={{fontFamily:F,fontSize:12,color:"#999",marginBottom:14}}>Individuelle priser overskriver den globale %. Tomt = standardpris.</p>
        {(()=>{const cats={};productData.forEach(p=>{if(p.category==="Gebyr")return;if(!cats[p.category])cats[p.category]=[];cats[p.category].push(p)});
          return Object.keys(cats).map(cat=><div key={cat} style={{marginBottom:16}}>
            <div style={{fontFamily:F,fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em",color:"#aaa",marginBottom:6,borderBottom:"1px solid #f0eeec",paddingBottom:4}}>{cat}</div>
            {cats[cat].map((p,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
              <span style={{fontFamily:F,fontSize:12,color:"#4a4a5a",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</span>
              <span style={{fontFamily:F,fontSize:11,color:"#bbb",width:55,textAlign:"right",flexShrink:0}}>{p.price} kr.</span>
              <input type="number" value={customPrices[p.name]||""} onChange={e=>{const v={...customPrices};if(e.target.value==="")delete v[p.name];else v[p.name]=e.target.value;setCustomPrices(v)}}
                placeholder="Din pris" style={{width:85,padding:"4px 8px",borderRadius:6,border:"1px solid #eee",fontFamily:F,fontSize:11,textAlign:"right"}}/>
            </div>)}
          </div>)})()}
        <button onClick={()=>setShowMæglerPricing(false)} style={{width:"100%",padding:"12px",borderRadius:10,border:"none",background:"#E8604C",color:"#fff",fontFamily:F,fontSize:14,fontWeight:700,cursor:"pointer",marginTop:8}}>Gem priser</button>
      </div>
    </div>}

    {/* HEADER */}
    <div style={{background:"#fff",borderBottom:"1px solid #f0eeec",padding:"12px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
      <div style={{display:"flex",alignItems:"center",gap:14}}>
        <img src={EFKT_LOGO} alt="EFKT" style={{height:28,display:"block",cursor:"pointer"}} onClick={()=>window.location.reload()}/>
        <div style={{width:1,height:20,background:"#e8e6e2"}}/>
        <span style={{fontFamily:F,fontSize:13,fontWeight:600,color:"#7a7a8e"}}>MLTB <span style={{color:"#E8604C",fontWeight:700}}>v3</span></span>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        {mæglerAuth ? <>
          <span style={{fontFamily:F,fontSize:12,color:"#4a4a5a"}}>{"\u{1F464}"} {mæglerUser}</span>
          <button onClick={()=>setShowMæglerPricing(true)} style={{padding:"6px 14px",borderRadius:8,border:"1px solid #E8604C",background:"#fef3f1",color:"#E8604C",fontFamily:F,fontSize:12,fontWeight:700,cursor:"pointer"}}>Mine priser</button>
          <button onClick={()=>{setMæglerAuth(false);setMæglerUser("");setMæglerPass("");setCustomPrices({});setGlobalPct(0)}} style={{padding:"6px 12px",borderRadius:8,border:"1px solid #ddd",background:"#fff",color:"#999",fontFamily:F,fontSize:11,cursor:"pointer"}}>Log ud</button>
        </> : <>
          <input type="text" value={mæglerUser} onChange={e=>{setMæglerUser(e.target.value);setMæglerErr(false)}} placeholder="Mægler-login" style={{padding:"6px 12px",borderRadius:8,border:"1px solid #ddd",fontFamily:F,fontSize:12,width:110}}/>
          <input type="password" value={mæglerPass} onChange={e=>{setMæglerPass(e.target.value);setMæglerErr(false)}} placeholder="Password" onKeyDown={e=>e.key==="Enter"&&handleMæglerLogin()}
            style={{padding:"6px 12px",borderRadius:8,border:mæglerErr?"1px solid #E8604C":"1px solid #ddd",fontFamily:F,fontSize:12,width:100}}/>
          <button onClick={handleMæglerLogin} style={{padding:"6px 14px",borderRadius:8,border:"none",background:"#E8604C",color:"#fff",fontFamily:F,fontSize:12,fontWeight:700,cursor:"pointer"}}>Log ind</button>
          {mæglerErr&&<span style={{fontFamily:F,fontSize:11,color:"#E8604C",fontWeight:600}}>Forkert login</span>}
        </>}
        <div style={{width:1,height:20,background:"#e8e6e2",margin:"0 2px"}}/>
        <div style={{display:"inline-flex",alignItems:"center",gap:6,padding:"5px 14px",borderRadius:20,background:"#fef3f1",color:"#E8604C",fontSize:11,fontWeight:700,fontFamily:F,letterSpacing:"0.06em",textTransform:"uppercase"}}>
          <span style={{width:6,height:6,borderRadius:"50%",background:"#E8604C",animation:"pulse 2s infinite"}}/>Mock-up
        </div>
      </div>
    </div>

    {/* HERO */}
    <div style={{background:"linear-gradient(135deg,#1a1a2e,#2B3A67)",padding:"44px 24px 0",textAlign:"center",position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",top:-80,right:-80,width:260,height:260,borderRadius:"50%",background:"rgba(232,96,76,0.08)"}}/>
      <div style={{position:"relative",zIndex:1,maxWidth:620,margin:"0 auto"}}>
        <h1 style={{fontFamily:F,fontSize:32,fontWeight:800,color:"#fff",margin:"0 0 8px",letterSpacing:"-0.02em",lineHeight:1.15}}>
          Hvem er mest <span style={{color:"#E8604C"}}>sandsynlige køber</span>
        </h1>
        <p style={{fontFamily:F,fontSize:13,color:"rgba(255,255,255,0.5)",margin:"0 0 28px"}}>Skriv en adresse og find den mest sandsynlige køber af boligen</p>
        <div style={{display:"flex",maxWidth:540,margin:"0 auto",background:"#fff",borderRadius:14,boxShadow:"0 4px 24px rgba(0,0,0,0.15)",overflow:"hidden"}}>
          <div style={{display:"flex",alignItems:"center",paddingLeft:16}}>
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#bbb" strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </div>
          <input type="text" value={address} onChange={e=>setAddress(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} placeholder="Indtast en adresse..."
            style={{flex:1,padding:"15px 12px",border:"none",background:"transparent",color:"#1a1a2e",fontSize:14,fontFamily:F,outline:"none"}}/>
          <button onClick={()=>go()} disabled={loading}
            style={{padding:"12px 24px",border:"none",margin:5,borderRadius:10,background:loading?"#ccc":"#E8604C",color:"#fff",fontFamily:F,fontSize:13,fontWeight:700,cursor:loading?"wait":"pointer",whiteSpace:"nowrap"}}
            onMouseEnter={e=>{if(!loading)e.currentTarget.style.background="#D4513E"}}
            onMouseLeave={e=>{if(!loading)e.currentTarget.style.background="#E8604C"}}>
            {loading?"Analyserer...":"Analysér"}
          </button>
        </div>
      </div>
      <div style={{marginTop:22}}><Wave/></div>
    </div>

    {/* CONTENT */}
    <div style={{maxWidth:800,margin:"0 auto",padding:"0 20px 100px"}}>
      {!result&&!loading&&<Suggestions onSelect={k=>{setAddress(k);go(k)}}/>}
      {loading&&<div style={{textAlign:"center",padding:"50px 0"}}>
        <div style={{width:36,height:36,margin:"0 auto 14px",border:"3px solid #f0eeec",borderTopColor:"#E8604C",borderRadius:"50%",animation:"spin 0.7s linear infinite"}}/>
        <p style={{fontFamily:F,fontSize:13,color:"#999"}}>Kører model...</p>
      </div>}
      {result&&result.notFound&&<div style={{textAlign:"center",padding:"40px 20px",marginTop:28,background:"#fff",borderRadius:16,border:"1px solid #f0eeec"}}>
        <p style={{fontFamily:F,fontSize:15,color:"#4a4a5a",fontWeight:600}}>Adressen blev ikke fundet.</p>
        <Suggestions onSelect={k=>{setAddress(k);go(k)}}/>
      </div>}

      {result&&result.property&&<div style={{marginTop:24,animation:"fadeUp 0.5s ease-out"}}>
        {/* Property card */}
        <div style={{background:"#fff",borderRadius:16,padding:"22px 28px",marginBottom:16,boxShadow:"0 1px 3px rgba(0,0,0,0.06)",border:"1px solid #f0eeec",position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:"linear-gradient(90deg,#E8604C,#D4513E,#C0453A)"}}/>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12}}>
            <div>
              <p style={{fontFamily:F,fontSize:10,fontWeight:600,color:"#E8604C",margin:"0 0 3px",textTransform:"uppercase",letterSpacing:"0.12em"}}>Størrelse: {getSizeBracket(result.property.area)}</p>
              <h2 style={{fontFamily:F,fontSize:19,fontWeight:700,color:"#1a1a2e",margin:0}}>{result.property.address}</h2>
            </div>
            <div style={{fontFamily:F,fontSize:20,fontWeight:800,color:"#1a1a2e"}}>{(result.property.price/1000000).toFixed(1)} <span style={{fontSize:13,fontWeight:500,color:"#7a7a8e"}}>mio.</span></div>
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:5,marginTop:12}}>
            {[result.property.type,result.property.area+" m\u00B2",result.property.rooms+"V","Opført "+result.property.year,"Energi "+result.property.energy,result.property.municipality].map((t,i)=>
              <span key={i} style={{padding:"3px 10px",borderRadius:14,fontSize:11.5,fontFamily:F,background:"#faf8f6",color:"#4a4a5a",border:"1px solid #eeece8"}}>{t}</span>)}
          </div>
        </div>

        {/* TWO-COLUMN LAYOUT */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,alignItems:"start"}}>
          {/* LEFT: Segments */}
          <div style={{background:"#fff",borderRadius:16,padding:"20px 22px",boxShadow:"0 1px 3px rgba(0,0,0,0.04)",border:"1px solid #f0eeec"}}>
            <h3 style={{fontFamily:F,fontSize:15,fontWeight:700,color:"#1a1a2e",margin:"0 0 12px"}}>Købersandsynlighed</h3>
            <p style={{fontFamily:F,fontSize:11,color:"#999",marginBottom:10}}>Klik for at vælge segment og se pakken</p>
            {result.buyers.filter(b=>b.probability>0).map((seg,i)=>
              <SegmentBar key={seg.id} segment={seg} rank={i} maxProb={result.buyers[0]?result.buyers[0].probability:1} isTop={i<3} isSelected={selectedSeg===seg.label}
                onClick={()=>{setSelectedSeg(seg.label);setExtras([])}}/>
            )}
          </div>

          {/* RIGHT: Package */}
          <div>
            <div style={{background:"#fff",borderRadius:16,padding:"20px 22px",boxShadow:"0 1px 3px rgba(0,0,0,0.06),0 8px 24px rgba(0,0,0,0.04)",border:"1px solid #f0eeec"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
                <span style={{fontSize:20}}>{"\u{1F4E6}"}</span>
                <div>
                  <h3 style={{fontFamily:F,fontSize:15,fontWeight:700,color:"#1a1a2e",margin:0}}>EFKT-pakke</h3>
                  <p style={{fontFamily:F,fontSize:11,color:"#999",margin:0}}>Segment: <strong style={{color:"#E8604C"}}>{selectedSeg}</strong></p>
                </div>
              </div>
              {mæglerAuth&&(Object.keys(customPrices).length>0||globalPct!==0)&&<div style={{padding:"8px 14px",background:"#E8F4FD",borderRadius:8,marginBottom:12,fontFamily:F,fontSize:11,color:"#2B3A67",fontWeight:600,display:"flex",alignItems:"center",gap:6}}>
                {"\u{1F464}"} Mægler-priser aktive {globalPct!==0&&<span>(global: {globalPct>0?"+":""}{globalPct}%)</span>}
              </div>}
              <PackageTable pkg={pkg} extras={extras} customPrices={customPrices} globalPct={globalPct} onRemoveExtra={eid=>setExtras(extras.filter(e=>e._eid!==eid))}/>
            </div>
            <AddProductsPanel productData={productData} extras={extras} setExtras={setExtras} area={result.property.area}/>
          </div>
        </div>

        {/* Footer */}
        <div style={{textAlign:"center",marginTop:36,paddingTop:20,borderTop:"1px solid #f0eeec"}}>
          <img src={EFKT_LOGO} alt="EFKT" style={{height:18,opacity:0.3,margin:"0 auto",display:"block"}}/>
          <p style={{fontFamily:F,fontSize:11,color:"#ccc",marginTop:6}}>#WeCreateEFKT</p>
        </div>
      </div>}
    </div>

    {/* ADMIN BUTTON — bottom right */}
    {!showAdmin&&<div style={{position:"fixed",bottom:20,right:20,zIndex:50}}>
      {!adminAuth ? <div style={{background:"#fff",borderRadius:12,padding:"14px 18px",boxShadow:"0 4px 20px rgba(0,0,0,0.12)",border:"1px solid #f0eeec",width:220}}>
        <div style={{fontFamily:F,fontSize:11,fontWeight:700,color:"#999",marginBottom:8,textTransform:"uppercase",letterSpacing:"0.08em"}}>Admin</div>
        <input type="text" value={adminUser} onChange={e=>{setAdminUser(e.target.value);setAdminLoginError(false)}} placeholder="Brugernavn"
          style={{width:"100%",padding:"7px 10px",borderRadius:6,border:"1px solid #eee",fontFamily:F,fontSize:12,marginBottom:5}}/>
        <input type="password" value={adminPass} onChange={e=>{setAdminPass(e.target.value);setAdminLoginError(false)}} placeholder="Password" onKeyDown={e=>e.key==="Enter"&&handleAdminLogin()}
          style={{width:"100%",padding:"7px 10px",borderRadius:6,border:"1px solid #eee",fontFamily:F,fontSize:12,marginBottom:5}}/>
        {adminLoginError&&<p style={{fontFamily:F,fontSize:11,color:"#E8604C",margin:"0 0 5px"}}>Forkert login</p>}
        <button onClick={handleAdminLogin} style={{width:"100%",padding:"8px",borderRadius:8,border:"none",background:"#1a1a2e",color:"#fff",fontFamily:F,fontSize:12,fontWeight:700,cursor:"pointer"}}>Log ind</button>
      </div> : <button onClick={()=>setShowAdmin(true)} style={{background:"#1a1a2e",color:"#fff",border:"none",borderRadius:12,padding:"12px 18px",fontFamily:F,fontSize:12,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 16px rgba(0,0,0,0.2)",display:"flex",alignItems:"center",gap:8}}>
        <span>{"\u2699\uFE0F"}</span> Admin
      </button>}
    </div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
