const SEG_LABELS = SEGMENTS.map(s => s.label);

function gaussLL(x,m,s){if(s<=0)return 0;const z=(x-m)/s;return -0.5*z*z-Math.log(s)}
function eCat(e){if(!e)return"neutral";if(e.startsWith("A")||e==="B")return"modern";if(e==="C"||e==="D")return"neutral";return"old"}

function predictV2(prop) {
  const res = SEGMENTS.map(seg => {
    const p = seg.profile; let ls = Math.log(seg.basePrior+0.001);
    ls += gaussLL(prop.area,p.area.mean,p.area.sd)*1.5;
    ls += gaussLL(prop.rooms,p.rooms.mean,p.rooms.sd)*1.8;
    ls += gaussLL(prop.price,p.price.mean,p.price.sd)*1.3;
    ls += gaussLL(prop.year,p.year.mean,p.year.sd)*0.6;
    ls += gaussLL(prop.groundArea,p.groundArea.mean,p.groundArea.sd)*1.0;
    ls += gaussLL(prop.floors,p.floors.mean,p.floors.sd)*0.4;
    ls += Math.log((p.zoneAffinity[prop.zone]||0.05)+0.001)*2.0;
    ls += Math.log((p.typeAffinity[prop.type]||0.05)+0.001)*1.6;
    ls += Math.log((p.energyPref[eCat(prop.energy)]||0.3)+0.001)*0.5;
    const ppm2=prop.price/Math.max(prop.area,1);const ePpm2=p.price.mean/Math.max(p.area.mean,1);
    ls += gaussLL(ppm2,ePpm2,ePpm2*0.4)*0.8;
    return {...seg, logScore:ls};
  });
  const mx = Math.max(...res.map(r=>r.logScore));
  const ex = res.map(r=>({...r, expScore:Math.exp(r.logScore-mx)}));
  const sm = ex.reduce((s,r)=>s+r.expScore,0);
  return ex.map(r=>({...r, probability:Math.round((r.expScore/sm)*100)})).sort((a,b)=>b.probability-a.probability);
}

function getSizeBracket(area) {
  if (area < 75) return "<75";
  if (area <= 150) return "75-150";
  if (area <= 250) return "150-250";
  return ">250";
}

// Build recommended package
function buildPackage(segmentLabel, area) {
  const sizeBracket = getSizeBracket(area);
  const items = [];

  // 1. Add size-based products (always included)
  PRODUCTS.forEach(p => {
    const count = p.sizes[sizeBracket];
    if (count && count > 0) {
      items.push({ ...p, qty: count, source: "size" });
    }
  });

  // 2. Add segment-based products
  let filmWebAdded = false;
  let filmSoMeAdded = false;

  PRODUCTS.forEach(p => {
    const count = p.segments[segmentLabel];
    if (!count || count <= 0) return;

    // Enforce max 1 Film Web / 1 Film SoMe
    if (p.category === "Film Web") {
      if (filmWebAdded) return;
      filmWebAdded = true;
    }
    if (p.category === "Film SoMe") {
      if (filmSoMeAdded) return;
      filmSoMeAdded = true;
    }

    // Check if already added from size
    const existing = items.find(i => i.name === p.name);
    if (existing) {
      existing.qty = Math.max(existing.qty, count);
      existing.source = "both";
    } else {
      items.push({ ...p, qty: count, source: "segment" });
    }
  });

  return items;
}

    <div style={{background:"#fff",borderBottom:"1px solid #f0eeec",padding:"10px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
      <div style={{display:"flex",alignItems:"center",gap:14}}>
        <img src={EFKT_LOGO} alt="EFKT" style={{height:30,display:"block"}}/>
        <div style={{width:1,height:22,background:"#e8e6e2"}}/>
        <span style={{fontFamily:F,fontSize:13,fontWeight:600,color:"#7a7a8e"}}>MLTB <span style={{color:"#E8604C",fontWeight:700}}>v2</span></span>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        {loggedIn ? <>
          <span style={{fontFamily:F,fontSize:12,color:"#4a4a5a"}}>👤 {loginName}</span>
          <button onClick={()=>setShowPricing(true)} style={{padding:"6px 14px",borderRadius:8,border:"1px solid #E8604C",background:"#fef3f1",color:"#E8604C",fontFamily:F,fontSize:12,fontWeight:700,cursor:"pointer"}}>Mine priser</button>
          <button onClick={()=>{setLoggedIn(false);setLoginName("")}} style={{padding:"6px 12px",borderRadius:8,border:"1px solid #ddd",background:"#fff",color:"#999",fontFamily:F,fontSize:11,cursor:"pointer"}}>Log ud</button>
        </> : <>
          <input type="text" value={loginName} onChange={e=>setLoginName(e.target.value)} placeholder="Mægler-navn" onKeyDown={e=>e.key==="Enter"&&loginName.trim()&&setLoggedIn(true)}
            style={{padding:"6px 12px",borderRadius:8,border:"1px solid #ddd",fontFamily:F,fontSize:12,width:130}}/>
          <button onClick={()=>loginName.trim()&&setLoggedIn(true)} style={{padding:"6px 14px",borderRadius:8,border:"none",background:"#E8604C",color:"#fff",fontFamily:F,fontSize:12,fontWeight:700,cursor:"pointer"}}>Log ind</button>
        </>}
      </div>
    </div>

    {/* HERO */}
    <div style={{background:"linear-gradient(135deg,#1a1a2e,#2B3A67)",padding:"48px 24px 0",textAlign:"center",position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",top:-80,right:-80,width:260,height:260,borderRadius:"50%",background:"rgba(232,96,76,0.08)"}}/>
      <div style={{position:"relative",zIndex:1,maxWidth:640,margin:"0 auto"}}>
        <h1 style={{fontFamily:F,fontSize:34,fontWeight:800,color:"#fff",margin:"0 0 8px",letterSpacing:"-0.02em",lineHeight:1.15}}>
          Forudsig den <span style={{color:"#E8604C"}}>rette køber</span>
        </h1>
        <p style={{fontFamily:F,fontSize:14,color:"rgba(255,255,255,0.5)",margin:"0 0 28px",lineHeight:1.6}}>
          Bayesian model · Produktpakke-anbefaling · Mæglerpriser
        </p>
        <div style={{display:"flex",maxWidth:560,margin:"0 auto",background:"#fff",borderRadius:14,boxShadow:"0 4px 24px rgba(0,0,0,0.15)",overflow:"hidden"}}>
          <div style={{display:"flex",alignItems:"center",paddingLeft:18}}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#bbb" strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </div>
          <input type="text" value={address} onChange={e=>setAddress(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} placeholder="Indtast en adresse..."
            style={{flex:1,padding:"16px 14px",border:"none",background:"transparent",color:"#1a1a2e",fontSize:15,fontFamily:F,outline:"none"}}/>
          <button onClick={()=>go()} disabled={loading}
            style={{padding:"14px 28px",border:"none",margin:5,borderRadius:10,background:loading?"#ccc":"#E8604C",color:"#fff",fontFamily:F,fontSize:14,fontWeight:700,cursor:loading?"wait":"pointer",whiteSpace:"nowrap"}}
            onMouseEnter={e=>{if(!loading)e.currentTarget.style.background="#D4513E"}}
            onMouseLeave={e=>{if(!loading)e.currentTarget.style.background="#E8604C"}}>
            {loading?"Analyserer...":"Analysér"}
          </button>
        </div>
      </div>
      <div style={{marginTop:24}}><Wave/></div>
    </div>

    {/* CONTENT */}
    <div style={{maxWidth:760,margin:"0 auto",padding:"0 20px 80px"}}>
      {!result&&!loading&&<Suggestions onSelect={k=>{setAddress(k);go(k)}}/>}
      {loading&&<div style={{textAlign:"center",padding:"56px 0"}}>
        <div style={{width:36,height:36,margin:"0 auto 14px",border:"3px solid #f0eeec",borderTopColor:"#E8604C",borderRadius:"50%",animation:"spin 0.7s linear infinite"}}/>
        <p style={{fontFamily:F,fontSize:13,color:"#999"}}>Kører Bayesian model · Bygger produktpakke...</p>
      </div>}

      {result&&result.notFound&&<div style={{textAlign:"center",padding:"44px 20px",marginTop:28,background:"#fff",borderRadius:16,border:"1px solid #f0eeec"}}>
        <div style={{fontSize:36,marginBottom:10}}>🏠</div>
        <p style={{fontFamily:F,fontSize:15,color:"#4a4a5a",fontWeight:600}}>Adressen blev ikke fundet.</p>
        <Suggestions onSelect={k=>{setAddress(k);go(k)}}/>
      </div>}

      {result&&result.property&&<div style={{marginTop:28,animation:"fadeUp 0.5s ease-out"}}>
        {/* Property card */}
        <div style={{background:"#fff",borderRadius:16,padding:"24px 28px",marginBottom:20,boxShadow:"0 1px 3px rgba(0,0,0,0.06),0 8px 24px rgba(0,0,0,0.04)",border:"1px solid #f0eeec",position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:"linear-gradient(90deg,#E8604C,#D4513E,#C0453A)"}}/>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12}}>
            <div>
              <p style={{fontFamily:F,fontSize:11,fontWeight:600,color:"#E8604C",margin:"0 0 4px",textTransform:"uppercase",letterSpacing:"0.12em"}}>BBR-data · Størrelse: {getSizeBracket(result.property.area)}</p>
              <h2 style={{fontFamily:F,fontSize:20,fontWeight:700,color:"#1a1a2e",margin:0}}>{result.property.address}</h2>
            </div>
            <div style={{fontFamily:F,fontSize:22,fontWeight:800,color:"#1a1a2e"}}>{(result.property.price/1000000).toFixed(1)} <span style={{fontSize:14,fontWeight:500,color:"#7a7a8e"}}>mio.</span></div>
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:14}}>
            {[result.property.type, result.property.area+" m²", result.property.rooms+"V", "Opført "+result.property.year, "Energi "+result.property.energy, result.property.municipality].map((t,i)=>
              <span key={i} style={{padding:"4px 10px",borderRadius:16,fontSize:12,fontFamily:F,background:"#faf8f6",color:"#4a4a5a",border:"1px solid #eeece8"}}>{t}</span>
            )}
          </div>
        </div>

        {/* Buyer probabilities */}
        <div style={{background:"#fff",borderRadius:16,padding:"24px 28px",marginBottom:20,boxShadow:"0 1px 3px rgba(0,0,0,0.04)",border:"1px solid #f0eeec"}}>
          <h3 style={{fontFamily:F,fontSize:16,fontWeight:700,color:"#1a1a2e",margin:"0 0 14px"}}>Købersandsynlighed</h3>
          {result.buyers.filter(b=>b.probability>0).map((seg,i)=><Bar key={seg.id} segment={seg} rank={i} maxProb={result.buyers[0]?result.buyers[0].probability:1} isTop={i<3}/>)}
        </div>

        <div style={{margin:"8px 0"}}><Wave flip={true}/></div>

        {/* PACKAGE RECOMMENDATION */}
        <div style={{background:"#fff",borderRadius:16,padding:"28px 32px",marginTop:12,boxShadow:"0 1px 3px rgba(0,0,0,0.06),0 8px 24px rgba(0,0,0,0.04)",border:"1px solid #f0eeec"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}>
            <span style={{fontSize:24}}>📦</span>
            <div>
              <h3 style={{fontFamily:F,fontSize:17,fontWeight:700,color:"#1a1a2e",margin:0}}>Anbefalet <span style={{color:"#E8604C"}}>EFKT-pakke</span></h3>
              <p style={{fontFamily:F,fontSize:12,color:"#999",margin:"2px 0 0"}}>
                Baseret på segment: <strong style={{color:"#1a1a2e"}}>{result.topSegLabel}</strong> + størrelse: <strong style={{color:"#1a1a2e"}}>{getSizeBracket(result.property.area)}</strong>
              </p>
            </div>
          </div>
          <PackageView pkg={result.pkg} customPrices={customPrices} globalPct={globalPct}/>
          {!loggedIn && <p style={{fontFamily:F,fontSize:11,color:"#bbb",marginTop:16,textAlign:"center"}}>Log ind som mægler for at sætte egne priser</p>}
        </div>

        {/* Footer */}
        <div style={{textAlign:"center",marginTop:36,paddingTop:20,borderTop:"1px solid #f0eeec"}}>
          <img src={EFKT_LOGO} alt="EFKT" style={{height:20,opacity:0.3,margin:"0 auto",display:"block"}}/>
          <p style={{fontFamily:F,fontSize:11,color:"#ccc",marginTop:6}}>#WeCreateEFKT</p>
        </div>
      </div>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script></body></html>
