function scoreBuyer(seg, p) {
  let s = 10; const t = seg.triggers;
  if (t.minRooms && p.rooms >= t.minRooms) s += 15;
  if (t.maxRooms && p.rooms <= t.maxRooms) s += 15;
  if (t.minArea && p.area >= t.minArea) s += 10;
  if (t.maxArea && p.area <= t.maxArea) s += 12;
  if (t.urban && (p.zone === "urban" || p.zone === "urban-premium")) s += 18;
  if (t.suburban && p.zone === "suburban") s += 18;
  if (t.rural && p.zone === "rural") s += 20;
  if (t.maxPrice && p.price <= t.maxPrice) s += 12;
  if (t.minPrice && p.price >= t.minPrice) s += 12;
  if (t.garden && p.groundArea > 400) s += 10;
  if (t.largeGround && p.groundArea > 900) s += 10;
  if (t.newer && p.year >= 2000) s += 10;
  if (t.older && p.year < 1980) s += 10;
  if (t.singleFloor && p.floors === 1) s += 8;
  if (t.quality && p.zone === "urban-premium") s += 15;
  if (t.lowPrice && p.price < 1800000) s += 12;
  if (t.investment && p.rooms <= 3 && (p.zone === "urban" || p.zone === "suburban")) s += 14;
  if (t.urban && p.zone === "rural") s -= 15;
  if (t.rural && p.zone === "urban") s -= 15;
  if (t.maxRooms && p.rooms > t.maxRooms + 2) s -= 10;
  if (t.minRooms && p.rooms < t.minRooms - 1) s -= 10;
  if (t.maxPrice && p.price > t.maxPrice * 1.5) s -= 15;
  if (t.maxArea && p.area > t.maxArea * 1.4) s -= 8;
  const h = seg.id.split("").reduce((a, c) => a + c.charCodeAt(0), 0);
  s += (h % 7) - 3;
  return Math.max(0, s);
}

function predictBuyers(property) {
  const scores = SEGMENTS.map((seg) => ({ ...seg, rawScore: scoreBuyer(seg, property) }));
  const total = scores.reduce((sum, s) => sum + s.rawScore, 0);
  return scores.map((s) => ({ ...s, probability: total > 0 ? Math.round((s.rawScore / total) * 100) : 0 })).sort((a, b) => b.probability - a.probability);
}

      </div>

      {/* CONTENT */}
      <div style={{ maxWidth: 720, margin: "0 auto", padding: "0 20px 80px" }}>
        {!result && !loading && <Suggestions onSelect={(k) => { setAddress(k); go(k); }} />}

        {loading && (
          <div style={{ textAlign: "center", padding: "56px 0" }}>
            <div style={{ width: 36, height: 36, margin: "0 auto 14px", border: "3px solid #f0eeec", borderTopColor: "#E8604C", borderRadius: "50%", animation: "spin 0.7s linear infinite" }} />
            <p style={{ fontFamily: "var(--f)", fontSize: 13, color: "#999" }}>Henter BBR-data · Kører segmenteringsmodel...</p>
          </div>
        )}

        {result?.notFound && (
          <div style={{ textAlign: "center", padding: "44px 20px", marginTop: 28, background: "#fff", borderRadius: 16, border: "1px solid #f0eeec" }}>
            <div style={{ fontSize: 36, marginBottom: 10 }}>🏠</div>
            <p style={{ fontFamily: "var(--f)", fontSize: 15, color: "#4a4a5a", fontWeight: 600 }}>Adressen blev ikke fundet i vores syntetiske datasæt.</p>
            <Suggestions onSelect={(k) => { setAddress(k); go(k); }} />
          </div>
        )}

        {result?.property && (
          <div style={{ marginTop: 28, animation: "fadeUp 0.5s ease-out" }}>
            <PropertyCard property={result.property} />

            <div style={{ background: "#fff", borderRadius: 16, padding: "24px 28px", marginBottom: 20, boxShadow: "0 1px 3px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.03)", border: "1px solid #f0eeec" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                <h3 style={{ fontFamily: "var(--f)", fontSize: 17, fontWeight: 700, color: "#1a1a2e", margin: 0 }}>Købersandsynlighed</h3>
                <span style={{ fontFamily: "var(--f)", fontSize: 11, color: "#bbb", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.08em" }}>{SEGMENTS.length} segmenter · v1.0</span>
              </div>
              {result.buyers.filter(b => b.probability > 0).map((seg, i) => <Bar key={seg.id} segment={seg} rank={i} maxProb={result.buyers[0]?.probability || 1} isTop={i < 3} />)}
            </div>

            <div style={{ margin: "8px 0" }}><Wave flip /></div>

            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14, marginTop: 8 }}>
              <h3 style={{ fontFamily: "var(--f)", fontSize: 17, fontWeight: 700, color: "#1a1a2e", margin: 0 }}>Top 3 · Profil & <span style={{ color: "#E8604C" }}>Content-anbefaling</span></h3>
              <button onClick={() => setShowDetail(!showDetail)} style={{ background: "#fff", border: "1px solid #eeece8", borderRadius: 8, padding: "6px 14px", cursor: "pointer", fontFamily: "var(--f)", fontSize: 12, fontWeight: 600, color: "#7a7a8e" }}
                onMouseEnter={(e) => e.currentTarget.style.borderColor = "#E8604C"}
                onMouseLeave={(e) => e.currentTarget.style.borderColor = "#eeece8"}>
                {showDetail ? "Skjul" : "Vis"} detaljer
              </button>
            </div>
            {showDetail && top3.map((seg) => <Detail key={seg.id} segment={seg} />)}

            <div style={{ marginTop: 28, padding: "20px 24px", borderRadius: 12, background: "#fff", border: "1px solid #f0eeec" }}>
              <div style={{ display: "flex", alignItems: "flex-start", gap: 12 }}>
                <div style={{ width: 32, height: 32, borderRadius: 8, background: "#fef3f1", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#E8604C" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
                </div>
                <p style={{ fontFamily: "var(--f)", fontSize: 12, color: "#999", margin: 0, lineHeight: 1.65 }}>
                  <strong style={{ color: "#7a7a8e" }}>Om modellen:</strong> Denne prototype bruger en regelbaseret scoringsmodel med syntetisk data. I produktion erstattes den med en gradient-boosted classifier (XGBoost/LightGBM) trænet på historiske handler fra Tinglysningen, beriget med BBR, DST og GeoData.
                </p>
              </div>
            </div>

            <div style={{ textAlign: "center", marginTop: 36, paddingTop: 20, borderTop: "1px solid #f0eeec" }}>
              <EFKTLogo height={18} style={{ opacity: 0.3, margin: "0 auto" }} />
              <p style={{ fontFamily: "var(--f)", fontSize: 11, color: "#ccc", marginTop: 6 }}>#WeCreateEFKT</p>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
  </script>
</body>
</html>
